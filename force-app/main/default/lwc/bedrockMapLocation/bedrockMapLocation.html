<!-- bedrockMapLocation.html -->
<template>
    <lightning-card icon-name="standard:account" title="Bedrock Corporate Headquarters" variant="base">
        <div class="card-body">
            <p class="subtitle">{addressLabel}</p>

            <template lwc:if={isLoading}>
                <div class="state-container">
                    <lightning-spinner size="small" alternative-text="Loading headquarters location"></lightning-spinner>
                </div>
            </template>

            <template lwc:elseif={hasError}>
                <div class="state-container slds-text-color_error">Unable to load headquarters location.</div>
            </template>

            <template lwc:elseif={hasLocation}>
                <lightning-map map-markers={mapMarkers} zoom-level={zoomLevel}></lightning-map> 
            </template>
        </div>
    </lightning-card>
</template>
